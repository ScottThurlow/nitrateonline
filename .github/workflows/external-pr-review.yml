name: Require approval for external PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  label-external:
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR is from outside collaborator
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prAuthor = context.payload.pull_request.user.login;

            // Check if the author has write access to the repo
            let hasAccess = false;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: prAuthor,
              });
              hasAccess = ['admin', 'write'].includes(data.permission);
            } catch (e) {
              // Not a collaborator
              hasAccess = false;
            }

            if (!hasAccess) {
              // Label the PR
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
                labels: ['external-contribution'],
              });

              // Add a comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
                body: 'Thank you for your contribution! This PR is from an external contributor and requires approval from a project maintainer before it can be merged.',
              });

              core.info(`PR #${context.payload.pull_request.number} from external contributor ${prAuthor} — labeled and commented.`);
            } else {
              core.info(`PR #${context.payload.pull_request.number} from collaborator ${prAuthor} — no action needed.`);
            }
