<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250" role="img" aria-label="Nitrate Online Legacy">
  <title>Nitrate Online Legacy</title>

  <!-- Background — muted purple/mauve like the original banner -->
  <rect width="250" height="250" fill="#3a2840"/>

  <!-- ── CLASSIC FILM REEL (open reel style from legacy banner) ── -->
  <g transform="translate(125,95)">
    <!-- Outer rim — thicker, more mechanical look -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="#d4c5a0" stroke-width="3"/>
    <circle cx="0" cy="0" r="68" fill="none" stroke="#d4c5a0" stroke-width="1"/>

    <!-- Reel body — semi-transparent so background shows through the open areas -->
    <!-- Five large openings between spokes (classic open-reel style) -->
    <!-- Draw five "pie wedge" openings using arcs -->
    <g fill="#3a2840" stroke="#d4c5a0" stroke-width="1.5">
      <!-- Wedge cutouts between spokes at r=25 to r=65 -->
      <!-- Using paths for the five open sections -->
      <path d="M 23.8,7.7 L 61.9,20.1 A 65 65 0 0 1 40.2,52.5 L 15.5,20.1 A 25 25 0 0 0 23.8,7.7 Z" fill="#3a2840"/>
      <path d="M 0,25 L 0,65 A 65 65 0 0 1 -40.2,52.5 L -15.5,20.1 A 25 25 0 0 0 0,25 Z" fill="#3a2840"/>
      <path d="M -23.8,7.7 L -61.9,20.1 A 65 65 0 0 1 -61.9,-20.1 L -23.8,-7.7 A 25 25 0 0 0 -23.8,7.7 Z" fill="#3a2840"/>
      <path d="M -15.5,-20.1 L -40.2,-52.5 A 65 65 0 0 1 0,-65 L 0,-25 A 25 25 0 0 0 -15.5,-20.1 Z" fill="#3a2840"/>
      <path d="M 23.8,-7.7 L 61.9,-20.1 A 65 65 0 0 1 61.9,20.1 L 23.8,7.7 A 25 25 0 0 0 23.8,-7.7 Z" fill="#3a2840"/>
    </g>

    <!-- Five spokes — thick, structural -->
    <g stroke="#d4c5a0" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-25" x2="0" y2="-68"/>
      <line x1="23.8" y1="7.7" x2="64.7" y2="20.9"/>
      <line x1="14.7" y1="20.2" x2="42" y2="54.7"/>
      <line x1="-14.7" y1="20.2" x2="-42" y2="54.7"/>
      <line x1="-23.8" y1="7.7" x2="-64.7" y2="20.9"/>
    </g>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="25" fill="#3a2840" stroke="#d4c5a0" stroke-width="2"/>

    <!-- Hub -->
    <circle cx="0" cy="0" r="12" fill="#d4c5a0"/>
    <circle cx="0" cy="0" r="7" fill="#3a2840"/>
    <circle cx="0" cy="0" r="3" fill="#d4c5a0" opacity="0.5"/>

    <!-- Film strip trailing from reel (lower right) -->
    <g fill="none" stroke="#d4c5a0" stroke-width="1.2">
      <!-- Film strip edges -->
      <path d="M 65,30 Q 85,55 80,85 Q 75,105 90,115" />
      <path d="M 72,26 Q 92,51 87,81 Q 82,101 97,111" />
      <!-- Sprocket holes along the strip -->
    </g>
    <g fill="#d4c5a0" opacity="0.6">
      <rect x="74" y="38" width="3" height="4" rx="0.5" transform="rotate(25,75,40)"/>
      <rect x="78" y="52" width="3" height="4" rx="0.5" transform="rotate(15,79,54)"/>
      <rect x="78" y="66" width="3" height="4" rx="0.5" transform="rotate(5,79,68)"/>
      <rect x="76" y="80" width="3" height="4" rx="0.5" transform="rotate(-5,77,82)"/>
      <rect x="78" y="94" width="3" height="4" rx="0.5" transform="rotate(-15,79,96)"/>
    </g>
  </g>

  <!-- ── WORDMARK — vintage serif style like the original ── -->

  <!-- "Nitrate Online" in classic serif -->
  <text
    x="125" y="218"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="bold"
    font-style="italic"
    fill="#d4c5a0"
  >Nitrate Online</text>

  <!-- Subtitle -->
  <text
    x="125" y="238"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9"
    font-weight="normal"
    letter-spacing="2"
    fill="#a89070"
  >MOVIE REVIEWS AND MORE</text>
</svg>
