<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <rect id="sp" x="-3.5" y="-5.5" width="7" height="11" rx="1.5"/>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle gradient overlay -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.6"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
  </defs>

  <!-- Art-deco top border -->
  <rect x="0" y="0" width="1200" height="3" fill="#c9a84c"/>
  <rect x="0" y="627" width="1200" height="3" fill="#c9a84c"/>

  <!-- Film reel icon (centered, scaled 2x from favicon) -->
  <g transform="translate(600,260) scale(2)">
    <circle cx="0" cy="0" r="47" fill="#0d0d0d"/>
    <circle cx="0" cy="0" r="47" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <g fill="#c9a84c">
      <use href="#sp" transform="translate(39,0)     rotate(0)"/>
      <use href="#sp" transform="translate(27.57,27.57) rotate(45)"/>
      <use href="#sp" transform="translate(0,39)     rotate(90)"/>
      <use href="#sp" transform="translate(-27.57,27.57) rotate(135)"/>
      <use href="#sp" transform="translate(-39,0)    rotate(180)"/>
      <use href="#sp" transform="translate(-27.57,-27.57) rotate(225)"/>
      <use href="#sp" transform="translate(0,-39)    rotate(270)"/>
      <use href="#sp" transform="translate(27.57,-27.57) rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <circle cx="0" cy="0" r="43" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
    <g fill="#c9a84c">
      <rect x="10" y="-1.25" width="18" height="2.5" rx="0.75" transform="rotate(0)"/>
      <rect x="10" y="-1.25" width="18" height="2.5" rx="0.75" transform="rotate(60)"/>
      <rect x="10" y="-1.25" width="18" height="2.5" rx="0.75" transform="rotate(120)"/>
      <rect x="10" y="-1.25" width="18" height="2.5" rx="0.75" transform="rotate(180)"/>
      <rect x="10" y="-1.25" width="18" height="2.5" rx="0.75" transform="rotate(240)"/>
      <rect x="10" y="-1.25" width="18" height="2.5" rx="0.75" transform="rotate(300)"/>
    </g>
    <circle cx="0" cy="0" r="9" fill="#c9a84c"/>
    <circle cx="0" cy="0" r="4.5" fill="#0d0d0d"/>
    <circle cx="0" cy="0" r="2" fill="#c9a84c" opacity="0.4"/>
  </g>

  <!-- NITRATE text -->
  <text x="600" y="440" text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-size="48" font-weight="900" letter-spacing="8"
    fill="#f5eed8">NITRATE</text>

  <!-- Decorative rule -->
  <line x1="400" y1="455" x2="800" y2="455" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>

  <!-- ONLINE text -->
  <text x="600" y="480" text-anchor="middle"
    font-family="'Raleway', Arial, sans-serif"
    font-size="18" font-weight="500" letter-spacing="12"
    fill="#c9a84c">ONLINE</text>

  <!-- Tagline -->
  <text x="600" y="530" text-anchor="middle"
    font-family="'Raleway', Arial, sans-serif"
    font-size="14" font-weight="400" letter-spacing="3"
    fill="#7a6428">FILM CRITICISM ARCHIVE, 1996-2004</text>
</svg>
