---
deployment:
  tasks:
    - export BRANCH=$(git rev-parse --abbrev-ref HEAD) && if [ "$BRANCH" = "ppe" ]; then export DEPLOYPATH=$HOME/public_html/ppe.nitrateonline.com/; else export DEPLOYPATH=$HOME/public_html/nitrateonline.com/; fi 
    - /bin/cp -R * $DEPLOYPATH
    - /bin/cp -R .htaccess $DEPLOYPATH 2>/dev/null || :
