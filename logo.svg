<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 70" role="img" aria-label="Nitrate Online">
  <title>Nitrate Online</title>
  <defs>
    <!-- Sprocket hole scaled for 70×70 reel (center 35,35, r=27 sprocket ring) -->
    <!-- Tangential, long axis vertical, centered at origin -->
    <rect id="sp2" x="-1.4" y="-2.2" width="2.8" height="4.4" rx="0.6"/>
  </defs>

  <!-- ── REEL (70×70 space, center 35,35) ── -->

  <!-- Body -->
  <circle cx="35" cy="35" r="33" fill="#0d0d0d"/>

  <!-- Outer rim -->
  <circle cx="35" cy="35" r="33" fill="none" stroke="#c9a84c" stroke-width="1.75"/>

  <!-- Thin inner accent ring -->
  <circle cx="35" cy="35" r="30" fill="none" stroke="#c9a84c" stroke-width="0.4" opacity="0.5"/>

  <!-- Sprocket holes at r=27 — 8 evenly spaced, tangential -->
  <!-- Positions: (35 + 27·cos θ, 35 + 27·sin θ) -->
  <g fill="#c9a84c">
    <use href="#sp2" transform="translate(62,35)       rotate(0)"/>
    <use href="#sp2" transform="translate(54.09,54.09) rotate(45)"/>
    <use href="#sp2" transform="translate(35,62)       rotate(90)"/>
    <use href="#sp2" transform="translate(15.91,54.09) rotate(135)"/>
    <use href="#sp2" transform="translate(8,35)        rotate(180)"/>
    <use href="#sp2" transform="translate(15.91,15.91) rotate(225)"/>
    <use href="#sp2" transform="translate(35,8)        rotate(270)"/>
    <use href="#sp2" transform="translate(54.09,15.91) rotate(315)"/>
  </g>

  <!-- Decorative inner ring -->
  <circle cx="35" cy="35" r="21" fill="none" stroke="#c9a84c" stroke-width="0.75"/>

  <!-- Six spokes — from r=7 to r=19, width=1.75 -->
  <!-- Rect extends right: x=42(r=7) to x=54(r=19), centered on y=35 -->
  <g fill="#c9a84c">
    <rect x="42" y="34.125" width="12" height="1.75" rx="0.5" transform="rotate(0,   35,35)"/>
    <rect x="42" y="34.125" width="12" height="1.75" rx="0.5" transform="rotate(60,  35,35)"/>
    <rect x="42" y="34.125" width="12" height="1.75" rx="0.5" transform="rotate(120, 35,35)"/>
    <rect x="42" y="34.125" width="12" height="1.75" rx="0.5" transform="rotate(180, 35,35)"/>
    <rect x="42" y="34.125" width="12" height="1.75" rx="0.5" transform="rotate(240, 35,35)"/>
    <rect x="42" y="34.125" width="12" height="1.75" rx="0.5" transform="rotate(300, 35,35)"/>
  </g>

  <!-- Hub -->
  <circle cx="35" cy="35" r="6.5"  fill="#c9a84c"/>
  <circle cx="35" cy="35" r="3.25" fill="#0d0d0d"/>
  <circle cx="35" cy="35" r="1.4"  fill="#c9a84c" opacity="0.4"/>

  <!-- ── WORDMARK TEXT ── -->
  <!-- Vertical separator line -->
  <line x1="82" y1="16" x2="82" y2="54" stroke="#7a6428" stroke-width="0.75"/>

  <!-- "NITRATE" — primary word, large, heavy -->
  <text
    x="94" y="31"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="21"
    font-weight="900"
    letter-spacing="3"
    fill="#f5eed8"
    dominant-baseline="auto"
  >NITRATE</text>

  <!-- Thin art-deco rule below "NITRATE" -->
  <line x1="94" y1="36.5" x2="284" y2="36.5" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>

  <!-- "ONLINE" — secondary word, smaller, spaced -->
  <text
    x="95.5" y="50"
    font-family="'Raleway', 'Arial', Helvetica, sans-serif"
    font-size="9"
    font-weight="500"
    letter-spacing="6.5"
    fill="#c9a84c"
    dominant-baseline="auto"
  >ONLINE</text>

  <!-- Tiny decorative dots flanking "ONLINE" -->
  <circle cx="91" cy="46.5" r="1.2" fill="#7a6428"/>
</svg>
